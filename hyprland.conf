# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,preferred,auto,auto
monitor=HDMI-A-1,preferred,auto,auto,mirror,eDP-1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = ~/.config/hypr/bin/wallpaper.sh & hypridle & fcitx5
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data
exec-once = hyprctl setcursor default 24
exec-once = hyprsunset
exec-once = kwalletd6
exec-once = kdeconnect & kdeconnect-indicator
exec-once = systemctl --user start hyprpolkitagent
exec-once = swaync

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf
source = ~/.cache/matugen/colors.conf

# Set programs that you use
$terminal = kitty
$terminal1 = alacritty
$fileManager = dolphin
$menu = wofi -S drun -I

# Some default env vars.
#env = HYPRCURSOR_SIZE,65
#env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that
env = QT_QPA_PLATFORM,wayland
env = XDG_MENU_PREFIX,arch-
env = GTK_THEME,adw-gtk3-dark
env = GTK2_RC_FILES,/usr/share/themes/adw-gtk3-dark/gtk-2.0/gtkrc
env = QT_QUICK_CONTROLS_STYLE,org.kde.desktop


# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0.7 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 5
    border_size = 1
    col.active_border = $primary $tertiary 45deg
    col.inactive_border = rgba(3c3c3c5a) #rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 2
    }

    shadow{
        enabled = true
        range = 10
        render_power = 6
        color = rgba(1a1a1aee)
    }
}

animations {    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    smart_split = true
}

#master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
#    new_is_master = true
#}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    # workspace_swipe = true
    # workspace_swipe_fingers = 4
    gesture = 4, horizontal, workspace
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device{
    name = usb-optical-mouse-
    sensitivity = 1.0
}

binds{
    movefocus_cycles_fullscreen = true
}

#windowrule = float on,match:class ^(kitty)$,match:title ^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule = suppress_event maximize, match:class .* # You'll probably like this.
windowrule = opacity 0.85, match:class org.kde.*
windowrule = no_blur on, match:class kitty
windowrule = no_blur on, match:class Alacritty
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = float on, match:class org.fcitx.fcitx5-config-qt
windowrule = float on, match:class hyprland-share-picker
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class hyprland-share-picker
windowrule = float on, match:title Sign in – Google accounts
windowrule {
    name = XDG desktop portal gtk
    match:class = xdg-desktop-portal-gtk
    float = on
    opacity = 0.85
}
windowrule {
    name = kde presentation daemon
    match:class = org.kde.kdeconnect.daemon
    float = on
    no_blur = on
    suppress_event = fullscreen
    size = monitor_w monitor_h
    move = 0 0
}

#File Picker
windowrule = float on, match:title  Blender
windowrule = size (monitor_w*0.6) (monitor_h*0.6), match:title  Blender

#picInPic
windowrule = float on, match:title ^([Pp][Ii][Cc][Tt][Uu][Rr][Ee][- ][Ii][Nn][- ][Pp][Ii][Cc][Tt][Uu][Rr][Ee])$
windowrule = pin on, match:title ^([Pp][Ii][Cc][Tt][Uu][Rr][Ee][- ][Ii][Nn][- ][Pp][Ii][Cc][Tt][Uu][Rr][Ee])$
windowrule = move (monitor_w*0.795) (monitor_h*0.2), match:title ^([Pp][Ii][Cc][Tt][Uu][Rr][Ee][- ][Ii][Nn][- ][Pp][Ii][Cc][Tt][Uu][Rr][Ee])$
windowrule = size (monitor_w*0.2) (monitor_h*0.18), match:title ^([Pp][Ii][Cc][Tt][Uu][Rr][Ee][- ][Ii][Nn][- ][Pp][Ii][Cc][Tt][Uu][Rr][Ee])$


## layerrules

# Sway Notification Center
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, Q, exec, $terminal1
bind = $mainMod, C, killactive, 
#bind = $mainMod, M, exit, 
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen
bind = $mainMod, L, exec, ~/.config/hypr/bin/lock.sh
bind = Alt, F10, fullscreen, 1
bind = $mainMod, H, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod, X, exec, hyprpicker -a
bind = $mainMod SHIFT, P, pin

#Special Binds
bind = $mainMod SHIFT, E, exec, $fileManager ~/Semesters/SEM_6

#App launch
bind = $mainMod, period, exec, wofi-emoji

#OBS Studio Controls
bind = SUPER, F10, pass, class:^(com\.obsproject\.Studio)$

# Screenshots
bind = , print, exec, hyprshot -m output -m active -o ~/Pictures/Screenshots
bind = CTRL, print, exec, hyprshot -m region -o ~/test1
bind = CTRL SHIFT, print, exec, hyprshot -m region --clipboard-only

#brightness control
bind=,XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind=,XF86MonBrightnessUp,exec,brightnessctl set +5%

#Volume control
bindl =,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl =,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl =,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

#Microphone control
bind =,XF86AudioMicMute, exec, ~/.config/hypr/bin/mic_mute.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#Swap tiles
bind = $mainMod, A, movewindow, l
bind = $mainMod, W, movewindow, u
bind = $mainMod, S, movewindow, d
bind = $mainMod, D, movewindow, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, Z, togglespecialworkspace, magic
bind = $mainMod SHIFT, Z, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#playerctl Media Control
bindl = $mainMod SHIFT, A, exec, playerctl play-pause
bindl = $mainMod SHIFT, N, exec, playerctl previous
bindl = $mainMod SHIFT, M, exec, playerctl next
